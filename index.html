<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>HBK Jadoon — Advanced Fleet Management System</title>
<meta name="description" content="Haji Barkat Khan Jadoon Goods Transport — advanced fleet, salary, invoices, attendance, analytics & finance portal."/>
<!-- PWA Integration -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#07111f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192' fill='%23ff8a3d'><rect width='192' height='192' rx='40' fill='%2307111f'/><text x='96' y='125' font-family='sans-serif' font-size='90' font-weight='900' text-anchor='middle' fill='%23ff8a3d'>H</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#07111f;--panel:rgba(13,21,38,.92);--panel2:rgba(17,27,47,.98);
  --line:rgba(142,160,201,.15);--text:#edf2ff;--muted:#8898b8;
  --accent:#ff8a3d;--good:#3ddc97;--bad:#ff5c5c;--warn:#ffbe3d;--info:#58a6ff;
  --shadow:0 24px 80px rgba(0,0,0,.42);
  --radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;color:var(--text);
  background:radial-gradient(ellipse at 0% 0%,rgba(255,138,61,.18) 0%,transparent 50%),
  radial-gradient(ellipse at 100% 0%,rgba(61,220,151,.14) 0%,transparent 50%),
  radial-gradient(ellipse at 50% 100%,rgba(88,166,255,.1) 0%,transparent 50%),
  linear-gradient(180deg,#07111f 0%,#09152a 50%,#060d1a 100%);
  min-height:100vh}
button,input,select,textarea{font:inherit}
button{cursor:pointer;border:0;background:none}
a{color:var(--accent);text-decoration:none}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:99px}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;right:28px;
  background:linear-gradient(135deg,rgba(17,27,47,.99),rgba(11,18,34,.99));
  border:1px solid rgba(255,138,61,.3);color:var(--text);
  padding:.8rem 1.4rem;border-radius:14px;font-weight:600;font-size:.9rem;
  z-index:9999;opacity:0;pointer-events:none;
  transform:translateY(14px);transition:all .28s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 12px 40px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateY(0)}

/* ── LOGIN ── */
.login{min-height:100vh;display:grid;place-items:center;padding:24px}
.login-card{width:min(1100px,100%);display:grid;grid-template-columns:1.15fr .85fr;
  border:1px solid var(--line);background:rgba(7,11,22,.94);border-radius:32px;
  overflow:hidden;box-shadow:0 60px 150px rgba(0,0,0,.7)}
.login-copy{padding:3rem;display:flex;flex-direction:column;justify-content:center;gap:20px;
  background:linear-gradient(135deg,rgba(255,138,61,.06),rgba(61,220,151,.04))}
.login-form{padding:3rem;background:rgba(11,18,34,.97);display:flex;flex-direction:column;justify-content:center}
.kicker{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(255,138,61,.22);
  background:rgba(255,138,61,.08);padding:.48rem .9rem;border-radius:999px;
  font-family:'JetBrains Mono',monospace;color:#ffcfaa;font-weight:700;font-size:.8rem;width:fit-content}
.hero{font-size:clamp(2rem,3.5vw,3.6rem);line-height:.95;font-weight:900;letter-spacing:-.03em}
.preview-row{display:flex;justify-content:space-between;gap:1rem;padding:.7rem 0;
  border-bottom:1px solid rgba(255,255,255,.055)}
.preview-row:last-child{border-bottom:0}

/* ── APP LAYOUT ── */
.app{min-height:100vh;display:grid;grid-template-columns:256px 1fr}
.hidden{display:none!important}

/* ── SIDEBAR ── */
.sidebar{padding:22px 16px;border-right:1px solid var(--line);
  background:rgba(6,10,20,.98);
  display:flex;flex-direction:column;justify-content:space-between;
  position:sticky;top:0;height:100vh;overflow-y:auto;z-index:10}
.brand{display:flex;gap:11px;align-items:center;margin-bottom:18px;padding:.6rem .8rem;
  border:1px solid rgba(255,138,61,.16);border-radius:16px;
  background:rgba(255,138,61,.06)}
.logo-box{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;
  color:#ffcfaa;background:linear-gradient(135deg,rgba(255,138,61,.3),rgba(255,138,61,.08));
  font-weight:900;font-size:.98rem;flex-shrink:0;border:1px solid rgba(255,138,61,.22)}
.brand-name{font-size:.82rem;font-weight:800;line-height:1.2}
.brand-sub{font-size:.7rem;color:var(--accent);font-weight:600;margin-top:2px}

.nav{display:grid;gap:3px;margin-bottom:8px}
.nav-sep{height:1px;background:var(--line);margin:6px 0}
.nav-group-label{font-size:.66rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);
  padding:.4rem .8rem .2rem;font-weight:700}
.nav button{display:flex;align-items:center;gap:9px;text-align:left;width:100%;
  padding:.72rem .9rem;border-radius:11px;color:var(--muted);
  background:transparent;border:1px solid transparent;
  font-size:.83rem;font-weight:500;transition:all .14s;position:relative}
.nav button:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav button.active{background:linear-gradient(135deg,rgba(255,207,170,.14),rgba(255,138,61,.08));
  color:var(--text);font-weight:700;border-color:rgba(255,138,61,.2)}
.nav .nav-icon{font-size:.95rem;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--bad);color:#fff;font-size:.65rem;
  font-weight:800;padding:.1rem .45rem;border-radius:999px;min-width:18px;text-align:center}

/* ── MAIN ── */
.main{padding:26px;min-width:0}
.topbar{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;
  flex-wrap:wrap;margin-bottom:22px}
.page-label{font-size:.74rem;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700}
.page-title{font-size:clamp(1.7rem,2.8vw,2.5rem);font-weight:900;letter-spacing:-.025em;line-height:1}

.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.search-box{display:flex;align-items:center;gap:9px;border:1px solid var(--line);
  background:var(--panel);border-radius:14px;padding:0 .85rem;min-width:min(320px,100%);
  transition:border-color .15s}
.search-box:focus-within{border-color:rgba(255,138,61,.35)}
.search-box input{border:0;background:transparent;color:var(--text);outline:none;
  padding:.8rem 0;width:100%;font-size:.88rem}

.user-pill{border:1px solid var(--line);background:var(--panel);
  border-radius:12px;padding:.75rem 1rem;font-size:.84rem;white-space:nowrap}
.user-pill .uname{font-weight:700;font-size:.88rem}
.user-pill .uemail{font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* NOTIFICATION BELL */
.notif-wrap{position:relative}
.notif-btn{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
  border:1px solid var(--line);background:var(--panel);font-size:1.15rem;transition:all .15s;position:relative}
.notif-btn:hover{background:rgba(255,255,255,.07);border-color:rgba(255,138,61,.3)}
@keyframes bell-ring{0%,100%{transform:rotate(0)}15%{transform:rotate(12deg)}30%{transform:rotate(-10deg)}45%{transform:rotate(8deg)}60%{transform:rotate(-6deg)}75%{transform:rotate(4deg)}}
.notif-btn.has-alerts{animation:bell-ring 3s 1s infinite}
.notif-count{position:absolute;top:-5px;right:-5px;background:var(--bad);color:#fff;
  font-size:.62rem;font-weight:900;min-width:17px;height:17px;border-radius:999px;
  display:grid;place-items:center;border:2px solid #07111f}
.notif-dropdown{position:absolute;top:calc(100% + 10px);right:0;width:340px;
  background:rgba(11,18,34,.99);border:1px solid var(--line);border-radius:18px;
  box-shadow:0 30px 80px rgba(0,0,0,.6);z-index:500;overflow:hidden;display:none}
.notif-dropdown.open{display:block}
.notif-header{padding:.9rem 1.1rem;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:.9rem}
.notif-item{padding:.75rem 1.1rem;border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;gap:10px;align-items:flex-start;font-size:.84rem}
.notif-item:last-child{border-bottom:0}
.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.notif-empty{padding:1.8rem;text-align:center;color:var(--muted);font-size:.88rem}

/* ── CARDS & PANELS ── */
.panel{border:1px solid var(--line);background:var(--panel2);
  box-shadow:var(--shadow);border-radius:var(--radius);padding:1.3rem}
.card-kpi{border:1px solid var(--line);background:var(--panel);border-radius:18px;
  padding:1.1rem 1.25rem;display:flex;gap:13px;align-items:flex-start;
  min-height:108px;transition:all .2s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 6px 22px rgba(0,0,0,.2);position:relative;overflow:hidden}
.card-kpi::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,currentColor,transparent);
  opacity:.04;pointer-events:none}
.card-kpi:hover{transform:translateY(-3px);box-shadow:0 18px 48px rgba(0,0,0,.38)}
.kpi-icon{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;
  font-size:1.35rem;flex-shrink:0;transition:transform .2s}
.card-kpi:hover .kpi-icon{transform:scale(1.1) rotate(-5deg)}
.kpi-value{font-size:1.85rem;font-weight:900;line-height:1;letter-spacing:-.025em}
.kpi-label{font-size:.78rem;color:var(--muted);font-weight:500;margin-top:.3rem}
.kpi-trend{font-size:.72rem;font-weight:700;margin-top:.4rem;padding:.15rem .5rem;
  border-radius:99px;width:fit-content}

.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:13px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:13px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px;margin-bottom:16px}

.section-head{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;flex-wrap:wrap;gap:10px}
.section-label{font-size:.73rem;text-transform:uppercase;letter-spacing:.15em;
  color:var(--muted);font-weight:700}

/* ── TABLE ── */
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);padding:.78rem .75rem;border-bottom:1px solid rgba(255,255,255,.07);font-weight:700}
.table td{padding:.82rem .75rem;border-bottom:1px solid rgba(255,255,255,.045);
  vertical-align:middle;font-size:.88rem}
.table tr:last-child td{border-bottom:0}
.table tr:hover td{background:rgba(255,255,255,.022)}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:.32rem .68rem;
  border-radius:999px;font-size:.73rem;font-weight:700;white-space:nowrap}
@keyframes pulse-dot{0%{transform:scale(.8);opacity:.5}50%{transform:scale(1.2);opacity:1}100%{transform:scale(.8);opacity:.5}}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-transit{background:#FF8A3D;box-shadow:0 0 7px #FF8A3D;animation:pulse-dot 1.8s infinite}
.dot-delayed{background:#FF5C5C;box-shadow:0 0 7px #FF5C5C;animation:pulse-dot 1.2s infinite}
.dot-pending{background:#8B93A7;box-shadow:0 0 5px #8B93A7;animation:pulse-dot 2.2s infinite}
.dot-active{background:#3DDC97;box-shadow:0 0 7px #3DDC97;animation:pulse-dot 2s infinite}

/* ── BUTTONS ── */
.btn{padding:.68rem 1.1rem;border-radius:11px;font-weight:700;font-size:.84rem;
  border:1px solid var(--line);color:var(--text);background:rgba(255,255,255,.04);transition:all .15s}
.btn:hover{background:rgba(255,255,255,.08);transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,#ffcfaa,#ff8a3d)!important;color:#07111f!important;border-color:transparent!important}
.btn-primary:hover{filter:brightness(1.07)!important;box-shadow:0 6px 20px rgba(255,138,61,.3)!important}
.btn-danger{background:rgba(255,92,92,.1)!important;color:#ff9090!important;border-color:rgba(255,92,92,.2)!important}
.btn-success{background:rgba(61,220,151,.1)!important;color:#3ddc97!important;border-color:rgba(61,220,151,.2)!important}
.btn-info{background:rgba(88,166,255,.1)!important;color:#58a6ff!important;border-color:rgba(88,166,255,.2)!important}
.btn-warn{background:rgba(255,190,61,.1)!important;color:#ffbe3d!important;border-color:rgba(255,190,61,.2)!important}
.btn-sm{padding:.38rem .75rem;font-size:.76rem;border-radius:9px}
.icon-btn{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;
  border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:.88rem;transition:all .15s}
.icon-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,138,61,.3)}

/* ── QUICK ACTIONS ── */
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.quick-btn{display:flex;align-items:center;gap:7px;padding:.55rem 1rem;border-radius:12px;
  border:1px solid var(--line);background:rgba(255,255,255,.035);color:var(--muted);
  font-size:.8rem;font-weight:600;transition:all .15s;cursor:pointer}
.quick-btn:hover{color:var(--text);border-color:rgba(255,138,61,.3);background:rgba(255,138,61,.06)}

/* ── SHIPMENT ── */
.ship-layout{display:grid;grid-template-columns:310px 1fr;gap:13px}
.ship-card{width:100%;text-align:left;padding:1rem;border:1px solid var(--line);
  background:var(--panel);border-radius:18px;color:var(--text);margin-bottom:8px;
  transition:all .16s}
.ship-card:hover{transform:translateY(-2px);box-shadow:0 18px 50px rgba(0,0,0,.38)}
.ship-card.active{border-color:rgba(255,138,61,.35);
  background:linear-gradient(160deg,rgba(255,138,61,.09),rgba(17,27,47,.95))}
.route-bar{height:9px;border-radius:999px;background:rgba(255,255,255,.07);
  margin:18px 0 10px;position:relative;overflow:hidden}
.route-fill{position:absolute;inset:0 auto 0 0;border-radius:inherit;transition:width .5s}
.route-truck{position:absolute;top:50%;transform:translateY(-50%);transition:left .5s;font-size:.9rem}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(3,6,14,.82);
  display:none;align-items:center;justify-content:center;padding:20px;z-index:200;pointer-events:none}
.modal-backdrop.show{display:flex;pointer-events:auto}
.modal{width:min(640px,100%);background:rgba(9,15,28,.99);border:1px solid var(--line);
  border-radius:24px;padding:1.6rem;box-shadow:0 50px 120px rgba(0,0,0,.75);
  pointer-events:auto;max-height:92vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-head strong{font-size:1.08rem;font-weight:800}
.modal-body{display:grid;gap:13px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
.field{display:grid;gap:6px}
.field label{font-size:.78rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea,
.auth-fields input,.auth-fields select{
  width:100%;border:1px solid var(--line);background:rgba(5,8,18,.85);
  color:var(--text);padding:.88rem 1rem;border-radius:12px;outline:none;
  transition:border-color .15s;font-size:.9rem}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(255,138,61,.5)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.role-switch{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.role-switch button,.role-btn{padding:.78rem 1rem;border-radius:12px;color:var(--muted);
  background:rgba(255,255,255,.04);border:1px solid var(--line);transition:all .15s;font-size:.9rem}
.role-switch button.active,.role-btn.active{background:linear-gradient(135deg,#ffcfaa,#ff8a3d);color:#07111f;font-weight:700;border-color:transparent}

/* ── MISC ── */
.mono{font-family:'JetBrains Mono',monospace}
.muted{color:var(--muted)}
.row{display:flex;justify-content:space-between;gap:14px;align-items:center;
  padding:.82rem 0;border-bottom:1px solid rgba(255,255,255,.05)}
.row:last-child{border-bottom:0}
.initials-avatar{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;
  color:#ffcfaa;background:linear-gradient(135deg,rgba(255,138,61,.18),rgba(61,220,151,.1));
  font-weight:700;font-size:.82rem;flex-shrink:0}
.empty-state{text-align:center;padding:3.5rem 1rem;color:var(--muted)}
.empty-state .icon{font-size:3.2rem;margin-bottom:.8rem;display:block}
.tag{display:inline-flex;padding:.22rem .55rem;border-radius:7px;font-size:.7rem;font-weight:700}

/* ── GPS CONTROL MONITOR ── */
.map-wrap {
  position: relative;
  width: 100%;
  background: rgba(8, 16, 32, 0.6);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.5);
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  margin-bottom: 16px;
}
@media(max-width: 900px) {
  .map-wrap { grid-template-columns: 1fr; }
}
.map-svg-container {
  padding: 1.5rem;
  display: flex;
  justify-content: center;
  align-items: center;
  border-right: 1px solid var(--line);
  background: radial-gradient(circle at center, rgba(14,28,54,0.4) 0%, transparent 80%);
}
@media(max-width: 900px) {
  .map-svg-container { border-right: 0; border-bottom: 1px solid var(--line); }
}
.map-sidebar {
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: rgba(6, 11, 22, 0.3);
  justify-content: center;
}
.map-terminal-indicator {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .65rem .85rem;
  background: rgba(255, 255, 255, .02);
  border: 1px solid rgba(255, 255, 255, .04);
  border-radius: 12px;
  font-size: .84rem;
}
.terminal-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  box-shadow: 0 0 10px currentColor;
}
@keyframes pulse-terminal-glow {
  0%, 100% { filter: drop-shadow(0 0 2px rgba(61,220,151,0.6)); }
  50% { filter: drop-shadow(0 0 10px rgba(61,220,151,1)); }
}
.pulse-glow-green {
  animation: pulse-terminal-glow 2.5s infinite;
}
@keyframes path-animate {
  to { stroke-dashoffset: -20; }
}
.route-path {
  stroke-dasharray: 6, 4;
  animation: path-animate 2s infinite linear;
}
@keyframes pulse-truck-glow {
  0%, 100% { filter: drop-shadow(0 0 3px #ff8a3d); }
  50% { filter: drop-shadow(0 0 12px #ff8a3d); }
}
.animated-truck-icon {
  animation: pulse-truck-glow 1.5s infinite ease-in-out;
}
@keyframes drive-truck-khi-lhr {
  0% { offset-distance: 0%; }
  100% { offset-distance: 100%; }
}
.map-truck-khi-lhr {
  offset-path: path("M50,280 L180,200 L250,150");
  offset-rotate: auto;
  animation: drive-truck-khi-lhr 22s infinite linear;
}
.map-truck-lhr-isb {
  offset-path: path("M250,150 L280,90");
  offset-rotate: auto;
  animation: drive-truck-khi-lhr 10s infinite linear;
}
.map-truck-isb-pes {
  offset-path: path("M280,90 L230,60");
  offset-rotate: auto;
  animation: drive-truck-khi-lhr 8s infinite linear;
}
.map-truck-khi-qta {
  offset-path: path("M50,280 L90,170");
  offset-rotate: auto;
  animation: drive-truck-khi-lhr 14s infinite linear;
}

/* ── CHART CONTAINERS ── */
.chart-wrap{position:relative;padding:1rem 0;height:220px}
.chart-wrap-sm{position:relative;height:160px}

/* ── ACTIVITY LOG ── */
.activity-item{display:flex;gap:12px;align-items:flex-start;padding:.7rem 0;
  border-bottom:1px solid rgba(255,255,255,.045)}
.activity-item:last-child{border-bottom:0}
.activity-dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex-shrink:0}
.activity-time{font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px}

/* ── ATTENDANCE GRID ── */
.att-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.att-day{aspect-ratio:1;border-radius:6px;display:grid;place-items:center;
  font-size:.7rem;font-weight:600;cursor:pointer;transition:all .12s;border:1px solid transparent}
.att-day.present{background:rgba(61,220,151,.18);color:#3ddc97;border-color:rgba(61,220,151,.2)}
.att-day.absent{background:rgba(255,92,92,.15);color:#ff5c5c;border-color:rgba(255,92,92,.18)}
.att-day.leave{background:rgba(255,190,61,.15);color:#ffbe3d;border-color:rgba(255,190,61,.18)}
.att-day.empty{background:rgba(255,255,255,.03);color:var(--muted)}

/* ── INVOICE CARD ── */
.inv-card{border:1px solid var(--line);border-radius:16px;padding:1rem;
  background:rgba(255,255,255,.02);transition:all .15s;margin-bottom:8px}
.inv-card:hover{border-color:rgba(255,138,61,.25);background:rgba(255,138,61,.03)}

/* ── SIDEBAR CARDS ── */
.sidebar-card{border:1px solid var(--line);background:rgba(255,255,255,.025);
  border-radius:13px;padding:.85rem}
.signout{display:flex;align-items:center;gap:8px;justify-content:center;
  width:100%;padding:.78rem 1rem;border-radius:12px;color:var(--muted);
  background:rgba(255,92,92,.05);border:1px solid rgba(255,92,92,.1);
  font-size:.84rem;transition:all .15s}
.signout:hover{background:rgba(255,92,92,.12);color:#ff9090}

/* ── SETTINGS FORM ── */
.settings-section{margin-bottom:22px}
.settings-title{font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);font-weight:700;margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid var(--line)}

/* ── STAT HIGHLIGHT ── */
.stat-highlight{border:1px solid rgba(255,138,61,.2);background:rgba(255,138,61,.06);
  border-radius:14px;padding:1rem;text-align:center}
.stat-num{font-size:2.2rem;font-weight:900;color:var(--accent)}
.stat-lbl{font-size:.78rem;color:var(--muted);margin-top:.2rem}

/* ── PROGRESS RING ── */
.progress-ring-wrap{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;padding:.5rem 0}

/* ── PRINT STYLES ── */
@media print{
  body{background:#fff!important;color:#000!important}
  .sidebar,.topbar,.notif-wrap,.btn,.icon-btn{display:none!important}
  .app{display:block!important}
  .main{padding:0!important}
  .panel,.card-kpi{border:1px solid #ddd!important;background:#f9f9f9!important;box-shadow:none!important}
}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .app{grid-template-columns:1fr}
  .sidebar{height:auto;position:static}
  .grid4{grid-template-columns:repeat(2,1fr)}
  .grid3{grid-template-columns:repeat(2,1fr)}
  .ship-layout,.field-row,.field-row3,.login-card{grid-template-columns:1fr}
  .search-box{min-width:100%}
}
@media(max-width:620px){
  .grid4,.grid3,.grid2{grid-template-columns:1fr}
  .main{padding:14px}
  .topbar{flex-direction:column;align-items:flex-start}
}

  return `<span class="badge" style="color:${color};background:${bg}"><span class="status-dot ${dc}"></span>${label}</span>`;

function kpi(value,label,color,icon,trend=''){
  return `<div class="card-kpi" style="color:${color}">
    <div class="kpi-icon" style="color:${color};background:${color}1f">${icon}</div>
    <div>
      <div class="kpi-value">${value}</div>
      <div class="kpi-label">${label}</div>
      ${trend?`<div class="kpi-trend" style="background:${color}18;color:${color}">${trend}</div>`:''}
    </div>
  </div>`;
}

let _toastTimer;
function toast(msg,type='good'){
  const colors={good:'rgba(61,220,151,.3)',bad:'rgba(255,92,92,.3)',info:'rgba(88,166,255,.3)',warn:'rgba(255,190,61,.3)'};
  const t=$('#toast');
  t.style.borderColor=colors[type]||colors.good;
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

function logActivity(action,module,details){
  if(!state.activityLog)state.activityLog=[];
  state.activityLog.unshift({id:`ACT-${pad(state.activityLog.length+10)}`,action,module,details,by:state.email||'System',at:new Date().toLocaleString()});
  if(state.activityLog.length>200)state.activityLog=state.activityLog.slice(0,200);
}

function getNotifications(){
  const n=[];
  state.stock.filter(s=>s.qty<s.reorder).forEach(s=>n.push({type:'warn',icon:'📦',msg:`Low stock: ${s.item} (${s.qty} ${s.unit} left)`}));
  const unpaidSal=state.salaries.filter(s=>s.status==='unpaid');
  if(unpaidSal.length)n.push({type:'bad',icon:'💰',msg:`${unpaidSal.length} unpaid salary record(s)`});
  state.vehicles.filter(v=>v.km>=v.nextService&&v.nextService>0).forEach(v=>n.push({type:'bad',icon:'🔧',msg:`${v.id} service OVERDUE at ${v.km.toLocaleString()} km!`}));
  state.shipments.filter(s=>s.status==='delayed').forEach(s=>n.push({type:'warn',icon:'🚚',msg:`Shipment ${s.id} — ${s.client} is DELAYED`}));
  const pendingRecv=state.receiving.filter(r=>r.approval!=='approved');
  if(pendingRecv.length)n.push({type:'info',icon:'📄',msg:`${pendingRecv.length} receiving slip(s) need approval`});
  const unpaidInv=state.invoices.filter(i=>i.status==='unpaid');
  if(unpaidInv.length)n.push({type:'warn',icon:'🧾',msg:`${unpaidInv.length} invoice(s) unpaid`});
  return n;
}

function renderNotifications(){
  const notifs=getNotifications();
  const btn=$('#notifBtn'); const cnt=$('#notifCount');
  if(!btn)return;
  if(notifs.length){btn.classList.add('has-alerts');cnt.classList.remove('hidden');cnt.textContent=notifs.length;}
  else{btn.classList.remove('has-alerts');cnt.classList.add('hidden');}
  const list=$('#notifList');
  if(!list)return;
  const colors={bad:'var(--bad)',warn:'var(--warn)',info:'var(--info)'};
  list.innerHTML=notifs.length
    ?notifs.map(n=>`<div class="notif-item"><div class="notif-dot" style="background:${colors[n.type]||'var(--muted)'}"></div><div><div style="font-weight:600">${n.icon} ${n.msg}</div></div></div>`).join('')
    :`<div class="notif-empty">✅ All clear — no alerts!</div>`;
  btn.onclick=()=>$('#notifDropdown').classList.toggle('open');
  document.addEventListener('click',e=>{if(!e.target.closest('.notif-wrap'))$('#notifDropdown')?.classList.remove('open');},{once:false});
}

  }

  // ── DASHBOARD: Expense donut ──
  const ctxDonut=document.getElementById('chart-donut');
  if(ctxDonut){
    const catMap={};
    state.transactions.filter(t=>t.type==='expense').forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
    const labels=Object.keys(catMap);const data=Object.values(catMap);
    _charts.donut=new Chart(ctxDonut,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:CHART_DEFAULTS.color,borderWidth:2,borderColor:'rgba(9,15,28,.99)'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#97a3c4',padding:10,font:{size:11}}}}}});
  }

  // ── REPORTS: Bar chart fuel per vehicle ──
  const ctxFuel=document.getElementById('chart-fuel-bar');
  if(ctxFuel){
    const vmap={};state.fuelLogs.forEach(f=>{vmap[f.vehicleId]=(vmap[f.vehicleId]||0)+f.total;});
    _charts.fuel=new Chart(ctxFuel,{type:'bar',data:{labels:Object.keys(vmap),datasets:[{label:'Fuel Cost (Rs)',data:Object.values(vmap),backgroundColor:'rgba(255,138,61,.7)',borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:CHART_DEFAULTS.gridColor},ticks:{callback:v=>'Rs '+Number(v).toLocaleString()}}}}});

// ══════════════════════════════════════════════════════
//  COUNT-UP ANIMATION
// ══════════════════════════════════════════════════════
function countUp(el,target,duration=900,prefix='',suffix=''){
  if(!el)return;
  const startTime=performance.now();
  function update(t){
    const p=Math.min((t-startTime)/duration,1);
    const eased=1-Math.pow(1-p,4);
    const val=Math.round(eased*target);
    el.textContent=prefix+(val>=1000?val.toLocaleString():val)+suffix;
    if(p<1)requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}
function animateKPIs(){
  setTimeout(()=>{
    $$('.kpi-animate').forEach(el=>{
      const target=+el.dataset.target||0;
      const prefix=el.dataset.prefix||'';
      const suffix=el.dataset.suffix||'';
      countUp(el,target,900,prefix,suffix);
    });
  },100);
}

// ══════════════════════════════════════════════════════
function wireModals(){
  const m=state.modals;
  // Close
  $$('[data-close]').forEach(b=>b.onclick=()=>{const k=b.dataset.close;state.modals[k]=false;['_editShip','_editStaff','_editVehicle','_editClient'].forEach(p=>delete state.modals[p]);saveState();render()});
  $$('.modal-backdrop').forEach(bd=>bd.onclick=e=>{if(e.target===bd){const k=bd.id.replace('modal','').toLowerCase();state.modals[k]=false;saveState();render()}});

  // SHIPMENT
  if(m.shipment&&$('#saveShipment'))$('#saveShipment').onclick=()=>{
    const client=$('#shipClient').value.trim();if(!client)return toast('Client required','bad');
    const obj={id:m._editShip!=null?state.shipments[m._editShip].id:`WB-${pad(state.shipments.length+49000)}`,client,origin:$('#shipOrigin').value.trim(),dest:$('#shipDest').value.trim(),status:$('#shipStatus').value,eta:$('#shipEta').value.trim(),driver:$('#shipDriver').value.trim(),vehicle:$('#shipVehicle').value,cargo:$('#shipCargo').value.trim(),weight:+$('#shipWeight').value||0,freightCharge:+$('#shipFreight').value||0,notes:$('#shipNotes').value.trim(),progress:{'scheduled':0,'in_transit':.3,'delayed':.3,'delivered':1}[$('#shipStatus').value]||0};
    if(m._editShip!=null)state.shipments[m._editShip]=obj;else state.shipments.unshift(obj);
    state.selectedShipment=obj.id;state.modals.shipment=false;delete state.modals._editShip;
    logActivity(m._editShip!=null?'Shipment updated':'Shipment added','Shipments',`${obj.id} — ${obj.client}`);
    saveState();toast(m._editShip!=null?`${obj.id} updated`:`${obj.id} created`);render();
  };

  // INVOICE
  if(m.invoice&&$('#saveInvoice'))$('#saveInvoice').onclick=()=>{
    const client=$('#invClient').value.trim();if(!client)return toast('Client required','bad');
    const inv={id:`INV-${pad(state.invoices.length+10)}`,shipmentId:$('#invShipId').value.trim(),client,amount:+$('#invAmount').value||0,date:shortDate(),dueDate:$('#invDue').value.trim(),status:$('#invStatus').value,notes:$('#invNotes').value.trim()};
    state.invoices.unshift(inv);state.modals.invoice=false;
    logActivity('Invoice created','Invoices',`${inv.id} — ${client} — ${money(inv.amount)}`);
    saveState();toast(`${inv.id} created`);render();
  };

  // CLIENT
  if(m.client&&$('#saveClient'))$('#saveClient').onclick=()=>{
    const name=$('#cltName').value.trim();if(!name)return toast('Company name required','bad');
    const obj={id:m._editClient!=null?state.clients[m._editClient].id:`CLT-${pad(state.clients.length+5)}`,name,contact:$('#cltContact').value.trim(),phone:$('#cltPhone').value.trim(),city:$('#cltCity').value.trim(),email:$('#cltEmail').value.trim(),activeShipments:m._editClient!=null?state.clients[m._editClient].activeShipments:0,totalValue:m._editClient!=null?state.clients[m._editClient].totalValue:0};
    if(m._editClient!=null)state.clients[m._editClient]=obj;else state.clients.unshift(obj);
    state.modals.client=false;delete state.modals._editClient;logActivity('Client saved','Clients',name);saveState();toast(`${name} saved`);render();
  };

  // STAFF
  if(m.staff&&$('#saveStaff'))$('#saveStaff').onclick=()=>{
    const name=$('#staffName').value.trim();if(!name)return toast('Name required','bad');
    const email=$('#staffEmail').value.trim()||name.toLowerCase().replace(/\s+/g,'.')+'@hbkjadoon.pk';
    const initials=name.split(/\s+/).slice(0,2).map(p=>p[0].toUpperCase()).join('');
    const obj={id:m._editStaff!=null?state.staff[m._editStaff].id:`STF-${pad(state.staff.length+10)}`,name,email,role:$('#staffRole').value.trim()||'Driver',access:$('#staffAccess').value,status:'active',phone:$('#staffPhone').value.trim(),cnic:$('#staffCnic').value.trim(),joined:$('#staffJoined').value.trim(),salary:+$('#staffSalary').value||0,allowance:+$('#staffAllowance').value||0,initials,password:$('#staffPassword').value.trim()||'123456'};
    if(m._editStaff!=null)state.staff[m._editStaff]=obj;else state.staff.unshift(obj);
    state.modals.staff=false;delete state.modals._editStaff;logActivity('Staff saved','Staff',name);saveState();toast(`${name} saved`);render();
  };

  // SALARY
  if(m.salary&&$('#saveSalary'))$('#saveSalary').onclick=()=>{
    const staffMember=state.staff.find(s=>s.id===$('#salStaff').value)||state.staff[0];if(!staffMember)return;
    const basic=+$('#salBasic').value||staffMember.salary||0;
    const allowance=+$('#salAllowance').value||staffMember.allowance||0;
    const deduction=+$('#salDeduction').value||0;const total=basic+allowance-deduction;
    const status=$('#salStatus').value;
    const obj={id:`SAL-${pad(state.salaries.length+10)}`,staffId:staffMember.id,staffName:staffMember.name,month:$('#salMonth').value,year:+$('#salYear').value,basic,allowance,deduction,total,status,paidDate:status==='paid'?shortDate():'',notes:$('#salNotes').value.trim()};
    state.salaries.unshift(obj);
    if(status==='paid'){state.transactions.unshift({id:`TXN-${pad(state.transactions.length+9010)}`,type:'expense',desc:`Salary — ${staffMember.name} (${obj.month} ${obj.year})`,date:shortDate(),amount:total,category:'Salary',month:new Date().toLocaleString('default',{month:'short'}),year:new Date().getFullYear()});}
    state.modals.salary=false;logActivity('Salary record added','Salaries',`${staffMember.name} ${obj.month} ${obj.year} — ${money(total)}`);saveState();toast(`Salary record added — ${money(total)}`);render();
  };

  // VEHICLE
  if(m.vehicle&&$('#saveVehicle'))$('#saveVehicle').onclick=()=>{
    const id=$('#vehId').value.trim();if(!id)return toast('Vehicle ID required','bad');
    const obj={id,type:$('#vehType').value,make:$('#vehMake').value.trim(),model:$('#vehModel').value.trim(),year:+$('#vehYear').value,plate:$('#vehPlate').value.trim(),driver:$('#vehDriver').value.trim(),status:$('#vehStatus').value,km:+$('#vehKm').value||0,nextService:+$('#vehNextService').value||0};
    if(m._editVehicle!=null)state.vehicles[m._editVehicle]=obj;else state.vehicles.unshift(obj);
    state.modals.vehicle=false;delete state.modals._editVehicle;logActivity('Vehicle saved','Vehicles',id);saveState();toast(`${id} saved`);render();
  };

  // FUEL
  if(m.fuel&&$('#saveFuel'))$('#saveFuel').onclick=()=>{
    const liters=+$('#fuelLiters').value||0;const rate=+$('#fuelRate').value||285;const total=liters*rate;
    const veh=$('#fuelVehicle').value;
    state.fuelLogs.unshift({id:`FL-${pad(state.fuelLogs.length+10)}`,vehicleId:veh,date:shortDate(),liters,costPerL:rate,total,odometer:+$('#fuelOdometer').value||0,station:$('#fuelStation').value.trim()});
    state.transactions.unshift({id:`TXN-${pad(state.transactions.length+9010)}`,type:'expense',desc:`Fuel — ${veh} (${liters}L @ Rs${rate}/L)`,date:shortDate(),amount:total,category:'Fuel',month:new Date().toLocaleString('default',{month:'short'}),year:new Date().getFullYear()});
    state.modals.fuel=false;logActivity('Fuel logged','Fuel Logs',`${veh} — ${liters}L — ${money(total)}`);saveState();toast(`Fuel logged — ${money(total)}`);render();
  };

  // MAINTENANCE
  if(m.maintenance&&$('#saveMaintenance'))$('#saveMaintenance').onclick=()=>{
    const type=$('#mntType').value.trim();if(!type)return toast('Service type required','bad');
    const cost=+$('#mntCost').value||0;const veh=$('#mntVehicle').value;
    state.maintenance.unshift({id:`MNT-${pad(state.maintenance.length+10)}`,vehicleId:veh,date:$('#mntDate').value||shortDate(),type,cost,nextDue:$('#mntNext').value.trim(),status:$('#mntStatus').value,notes:$('#mntNotes').value.trim()});
    if(cost>0)state.transactions.unshift({id:`TXN-${pad(state.transactions.length+9010)}`,type:'expense',desc:`Maintenance — ${veh}: ${type}`,date:shortDate(),amount:cost,category:'Maintenance',month:new Date().toLocaleString('default',{month:'short'}),year:new Date().getFullYear()});
    state.modals.maintenance=false;logActivity('Maintenance recorded','Maintenance',`${veh} — ${type}`);saveState();toast('Record saved');render();
  };

  // STOCK
  if(m.stock&&$('#saveStock'))$('#saveStock').onclick=()=>{
    const sku=$('#stockSku').value.trim();const item=$('#stockItem').value.trim();
    if(!sku||!item)return toast('SKU and item required','bad');
    state.stock.unshift({sku,item,warehouse:$('#stockWarehouse').value.trim(),qty:+$('#stockQty').value||0,reorder:+$('#stockReorder').value||0,unit:$('#stockUnit').value});
    state.modals.stock=false;logActivity('Stock item added','Stock',sku);saveState();toast(`${sku} added`);render();
  };

  // MOVEMENT
  if(m.movement&&$('#saveMovement'))$('#saveMovement').onclick=()=>{
    const sku=$('#moveSku').value;const qty=+$('#moveQty').value||0;
    if(!sku||!qty)return toast('SKU and qty required','bad');
    state.stockMovements.unshift({id:`SM-${pad(state.stockMovements.length+1010)}`,sku,type:$('#moveType').value,qty,source:$('#moveSource').value.trim(),bill:'',date:shortDate(),status:'pending'});
    state.modals.movement=false;saveState();toast(`Movement saved`);render();
  };

  // RECEIVING
  if(m.receiving&&$('#saveReceiving'))$('#saveReceiving').onclick=()=>{
    const supplier=$('#recvSupplier').value.trim();if(!supplier)return toast('Supplier required','bad');
    const id=`GRN-${pad(state.receiving.length+3085)}`;
    state.receiving.unshift({id,supplier,date:shortDate(),status:'pending',approval:'pending',bill:$('#recvBill').value.trim(),items:+$('#recvItems').value||1,value:+$('#recvValue').value||0});
    state.receivingLines[id]=[{name:'Pending entry',ordered:0,received:0}];
    state.modals.receiving=false;logActivity('Receiving slip created','Receiving',`${id} — ${supplier}`);saveState();toast(`${id} created`);render();
  };

  // PAYMENT
  if(m.payment&&$('#savePayment'))$('#savePayment').onclick=()=>{
    const desc=$('#payDesc').value.trim();if(!desc)return toast('Description required','bad');
    const id=`TXN-${pad(state.transactions.length+9010)}`;
    state.transactions.unshift({id,type:state.role==='Admin'?($('#payType')?$('#payType').value:'expense'):'expense',desc,date:shortDate(),amount:+$('#payAmt').value||0,category:$('#payCat').value.trim()||'General',month:new Date().toLocaleString('default',{month:'short'}),year:new Date().getFullYear()});
    state.modals.payment=false;logActivity('Transaction logged','Payments',desc);saveState();toast(state.role==='Admin'?`${id} recorded`:'Expense submitted');render();
  };

  // APPROVE ACTIONS
  $$('[data-approve-ship]').forEach(b=>b.onclick=()=>{const s=state.shipments.find(x=>x.id===b.dataset.approveShip);if(!s)return;s.status='delivered';s.progress=1;logActivity('Shipment delivered','Shipments',s.id);saveState();toast(`${s.id} delivered`);render()});
  $$('[data-approve-receiving]').forEach(b=>b.onclick=()=>{const slip=state.receiving.find(r=>r.id===b.dataset.approveReceiving);if(!slip)return;(state.receivingLines[slip.id]||[]).forEach(l=>{const si=state.stock.find(s=>s.item===l.name);if(si)si.qty=(si.qty||0)+(l.received||0);});slip.approval='approved';slip.status='received';logActivity('Receiving approved','Receiving',slip.id);saveState();toast(`${slip.id} approved`);render()});
  $$('[data-approve-movement]').forEach(b=>b.onclick=()=>{const mv=state.stockMovements.find(m=>m.id===b.dataset.approveMovement);if(!mv)return;const si=state.stock.find(s=>s.sku===mv.sku);if(si){if(mv.type==='in')si.qty=(si.qty||0)+(mv.qty||0);else si.qty=Math.max(0,(si.qty||0)-(mv.qty||0));}mv.status='approved';saveState();toast(`${mv.id} approved`);render()});

  // PAY SALARY
  $$('[data-pay-salary]').forEach(b=>b.onclick=()=>{const i=+b.dataset.paySalary;const sal=state.salaries[i];sal.status='paid';sal.paidDate=shortDate();state.transactions.unshift({id:`TXN-${pad(state.transactions.length+9010)}`,type:'expense',desc:`Salary — ${sal.staffName} (${sal.month} ${sal.year})`,date:shortDate(),amount:sal.total,category:'Salary',month:new Date().toLocaleString('default',{month:'short'}),year:new Date().getFullYear()});logActivity('Salary paid','Salaries',`${sal.staffName} — ${money(sal.total)}`);saveState();toast(`${sal.staffName} salary paid`);render()});

  // PAY INVOICE
  $$('[data-pay-invoice]').forEach(b=>b.onclick=()=>{const i=+b.dataset.payInvoice;state.invoices[i].status='paid';const inv=state.invoices[i];state.transactions.unshift({id:`TXN-${pad(state.transactions.length+9010)}`,type:'income',desc:`Invoice ${inv.id} — ${inv.client}`,date:shortDate(),amount:inv.amount,category:'Freight',month:new Date().toLocaleString('default',{month:'short'}),year:new Date().getFullYear()});logActivity('Invoice paid','Invoices',`${inv.id} — ${money(inv.amount)}`);saveState();toast(`${inv.id} marked paid`);render()});

  // PRINT INVOICE
  $$('[data-print-invoice]').forEach(b=>b.onclick=()=>{const inv=state.invoices[+b.dataset.printInvoice];if(inv)printInvoice(inv)});

  // GENERATE INVOICE FROM SHIPMENT
  $$('[data-gen-invoice]').forEach(b=>b.onclick=()=>{
    const s=state.shipments.find(x=>x.id===b.dataset.genInvoice);if(!s)return;
    const inv={id:`INV-${pad(state.invoices.length+10)}`,shipmentId:s.id,client:s.client,amount:s.freightCharge||0,date:shortDate(),dueDate:'',status:'unpaid',notes:''};
    state.invoices.unshift(inv);logActivity('Invoice generated','Invoices',`${inv.id} from ${s.id}`);saveState();printInvoice(inv);toast(`${inv.id} created`);render();
  });

  // PRINT SALARY SLIP
  $$('[data-print-slip]').forEach(b=>b.onclick=()=>{const sal=state.salaries[+b.dataset.printSlip];if(sal)printSalarySlip(sal)});
  $$('[data-print-salslip]').forEach(b=>b.onclick=()=>{
    const person=state.staff[+b.dataset.printSalslip];if(!person)return;
    const latestSal=state.salaries.filter(s=>s.staffId===person.id)[0];
    if(latestSal)printSalarySlip(latestSal);else toast('No salary record found for this employee','bad');
  });

  // TOGGLE STAFF STATUS
  $$('[data-toggle-staff]').forEach(b=>b.onclick=()=>{const i=+b.dataset.toggleStaff;state.staff[i].status=state.staff[i].status==='active'?'suspended':'active';saveState();render()});

  // ATTENDANCE TOGGLE
  $$('[data-att-staff]').forEach(btn=>btn.onclick=()=>{
    const staffId=btn.dataset.attStaff;const date=btn.dataset.attDate;
    const person=state.staff.find(s=>s.id===staffId);
    const idx=state.attendance.findIndex(a=>a.staffId===staffId&&a.date===date);
    const cycle=['present','absent','leave',null];
    if(idx<0){state.attendance.push({id:`ATT-${pad(state.attendance.length+10)}`,staffId,staffName:person?.name||staffId,date,status:'present'});}
    else{const cur=state.attendance[idx].status;const next=cycle[(cycle.indexOf(cur)+1)%cycle.length];if(next===null)state.attendance.splice(idx,1);else state.attendance[idx].status=next;}
    saveState();render();
  });

  // DELETE BUTTONS
  $$('[data-del-att]').forEach(b=>b.onclick=()=>{state.attendance.splice(+b.dataset.delAtt,1);saveState();render()});
  $$('[data-del-ship]').forEach(b=>b.onclick=()=>{if(!confirm('Delete shipment?'))return;state.shipments=state.shipments.filter(s=>s.id!==b.dataset.delShip);saveState();toast('Deleted','bad');render()});
  $$('[data-del-client]').forEach(b=>b.onclick=()=>{if(!confirm('Delete client?'))return;state.clients.splice(+b.dataset.delClient,1);saveState();toast('Deleted','bad');render()});
  $$('[data-del-staff]').forEach(b=>b.onclick=()=>{if(!confirm('Delete staff member?'))return;state.staff.splice(+b.dataset.delStaff,1);saveState();toast('Deleted','bad');render()});
  $$('[data-del-salary]').forEach(b=>b.onclick=()=>{if(!confirm('Delete salary record?'))return;state.salaries.splice(+b.dataset.delSalary,1);saveState();toast('Deleted','bad');render()});
  $$('[data-del-vehicle]').forEach(b=>b.onclick=()=>{if(!confirm('Delete vehicle?'))return;state.vehicles.splice(+b.dataset.delVehicle,1);saveState();toast('Deleted','bad');render()});
  $$('[data-del-fuel]').forEach(b=>b.onclick=()=>{state.fuelLogs.splice(+b.dataset.delFuel,1);saveState();toast('Deleted','bad');render()});
  $$('[data-del-mnt]').forEach(b=>b.onclick=()=>{state.maintenance.splice(+b.dataset.delMnt,1);saveState();toast('Deleted','bad');render()});
  $$('[data-del-stock]').forEach(b=>b.onclick=()=>{state.stock.splice(+b.dataset.delStock,1);saveState();toast('Deleted','bad');render()});
  $$('[data-del-txn]').forEach(b=>b.onclick=()=>{state.transactions.splice(+b.dataset.delTxn,1);saveState();toast('Deleted','bad');render()});
  $$('[data-del-invoice]').forEach(b=>b.onclick=()=>{if(!confirm('Delete invoice?'))return;state.invoices.splice(+b.dataset.delInvoice,1);saveState();toast('Deleted','bad');render()});

  // EDIT BUTTONS
  $$('[data-edit-ship]').forEach(b=>b.onclick=()=>{const i=state.shipments.findIndex(s=>s.id===b.dataset.editShip);if(i<0)return;state.modals._editShip=i;state.modals.shipment=true;saveState();render()});
  $$('[data-edit-client]').forEach(b=>b.onclick=()=>{state.modals._editClient=+b.dataset.editClient;state.modals.client=true;saveState();render()});
  $$('[data-edit-staff]').forEach(b=>b.onclick=()=>{state.modals._editStaff=+b.dataset.editStaff;state.modals.staff=true;saveState();render()});
  $$('[data-edit-vehicle]').forEach(b=>b.onclick=()=>{state.modals._editVehicle=+b.dataset.editVehicle;state.modals.vehicle=true;saveState();render()});

  // OPEN MODAL / SELECT SHIP
  $$('[data-open]').forEach(b=>b.onclick=()=>{state.modals[b.dataset.open]=true;saveState();render()});
  $$('[data-ship]').forEach(b=>b.onclick=()=>{state.selectedShipment=b.dataset.ship;render()});
}

  state.settings.companyName=$('#setCompanyName')?.value.trim()||state.settings.companyName;
  state.settings.companyFull=$('#setCompanyFull')?.value.trim()||state.settings.companyFull;
  state.settings.address=$('#setAddress')?.value.trim()||state.settings.address;

  state.settings.fuelRate=+$('#setFuelRate')?.value||state.settings.fuelRate;

  saveState();toast('Settings saved ✅');render();
}

// Staff: print their own latest salary slip
function printSalarySlipStaff(){
  const me=state.staff.find(p=>p.email===state.email)||state.staff.find(p=>p.access==='Staff')||null;
  if(!me){toast('⚠️ Your profile was not found. Ask Admin to add you.');return;}
  const mySalaries=state.salaries.filter(s=>s.staffId===me.id);
  if(!mySalaries.length){toast('⚠️ No salary records found for your account.');return;}
  // Most recent entry
  const latest=mySalaries[mySalaries.length-1];
  printSalarySlip(latest);
}

}

function printReport(){
  const win=window.open('','_blank');
  const income=state.transactions.filter(t=>t.type==='income').reduce((a,b)=>a+b.amount,0);
  const expense=state.transactions.filter(t=>t.type==='expense').reduce((a,b)=>a+b.amount,0);
  const s=state.settings;
  win.document.write(`<html><head><title>Fleet Report</title>${printBase}</head><body>
  <div class="header">
    <div><h1>${s.companyFull||'Haji Barkat Khan Jadoon Goods Transport'}</h1><div class="sub">Fleet Management Report</div></div>
    <div style="text-align:right"><div class="sub">Generated: ${new Date().toLocaleString()}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0">
    <div style="border:2px solid #ff8a3d;border-radius:8px;padding:12px;text-align:center"><div class="amount">${money(income)}</div><div class="label">Total Income</div></div>
    <div style="border:2px solid #ff5c5c;border-radius:8px;padding:12px;text-align:center"><div class="amount" style="color:#ff5c5c">${money(expense)}</div><div class="label">Total Expenses</div></div>
    <div style="border:2px solid #3ddc97;border-radius:8px;padding:12px;text-align:center"><div class="amount" style="color:#3ddc97">${money(income-expense)}</div><div class="label">Net ${income>=expense?'Profit':'Loss'}</div></div>
  </div>
  <h3 style="margin:16px 0 8px">Shipments (${state.shipments.length} total)</h3>
  <table><thead><tr><th>ID</th><th>Client</th><th>Route</th><th>Driver</th><th>Freight</th><th>Status</th></tr></thead>
  <tbody>${state.shipments.map(s=>`<tr><td>${s.id}</td><td>${s.client}</td><td>${s.origin}→${s.dest}</td><td>${s.driver||'—'}</td><td>${money(s.freightCharge||0)}</td><td>${s.status}</td></tr>`).join('')}</tbody></table>
  <h3 style="margin:16px 0 8px">Salary Records (${state.salaries.length} entries)</h3>
  <table><thead><tr><th>Staff</th><th>Period</th><th>Basic</th><th>Total</th><th>Status</th></tr></thead>
  <tbody>${state.salaries.map(s=>`<tr><td>${s.staffName}</td><td>${s.month} ${s.year}</td><td>${money(s.basic)}</td><td>${money(s.total)}</td><td>${s.status.toUpperCase()}</td></tr>`).join('')}</tbody></table>
  <h3 style="margin:16px 0 8px">Full Transaction Ledger (${state.transactions.length} entries)</h3>
  <table><thead><tr><th>ID</th><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th></tr></thead>
  <tbody>${state.transactions.map(t=>`<tr><td style="font-size:.74rem">${t.id}</td><td>${t.date}</td><td>${t.desc}</td><td>${t.category}</td><td>${t.type}</td><td style="font-weight:700;color:${t.type==='income'?'green':'red'}">${t.type==='income'?'+':'-'}${money(t.amount)}</td></tr>`).join('')}</tbody></table>
  <div class="footer">${s.companyFull} | Generated by HBK Fleet Management System v5</div>
  </body></html>`);
  win.document.close();win.focus();setTimeout(()=>win.print(),600);
}

function exportToJSON(){
  const data={...state,exportDate:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`hbk-fleet-v5-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
  toast('✅ Backup exported — save to Google Drive!');
}
function importFromJSON(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);['shipments','stock','receiving','receivingLines','transactions','staff','salaries','vehicles','fuelLogs','maintenance','clients','stockMovements','invoices','attendance','activityLog','settings'].forEach(k=>{if(data[k])state[k]=data[k];});saveState();toast('✅ Data restored!');render();}catch(e){toast('❌ Invalid backup file','bad');}};
    reader.readAsText(file);
  };input.click();
}
function resetData(){
  if(confirm('Reset ALL data to factory defaults (with demo records)? This cannot be undone.')){
    localStorage.removeItem(SK);
    location.reload();
  }
}
function purgeDemoData(){
  if(confirm('Purge all demo data and start with a clean database for production? This will clear all transactions, shipments, stock, and salaries.')){
    const cleanState = {
      shipments: [],
      stock: [],
      receiving: [],
      receivingLines: {},
      transactions: [],
      staff: [
        {id:'STF-001',name:'Barkat Manager',email:state.email||'admin@hbkjadoon.pk',role:'Operations Manager',access:'Admin',status:'active',phone:'0300-0000001',cnic:'35202-0000001-9',joined:new Date().toLocaleDateString('en-GB',{month:'short',year:'numeric'}),salary:80000,allowance:15000,initials:'BM'}
      ],
      salaries: [],
      vehicles: [],
      fuelLogs: [],
      maintenance: [],
      clients: [],
      stockMovements: [],
      invoices: [],
      attendance: [],
      activityLog: [
        {id:'ACT-001',action:'Database Purged',module:'Settings',details:'All demo data cleared. Clean database initialized.',by:state.email||'System',at:new Date().toLocaleString()}
      ]
    };
    Object.assign(state, cleanState);
    saveState();
    toast('🧹 Demo data purged! Clean database ready.');
    state.section = 'Dashboard';
    render();
  }
}
function loadDemoData(){
  if(confirm('Overwrite current database with demo seed records?')){
    ['shipments','stock','receiving','receivingLines','transactions','staff','salaries','vehicles','fuelLogs','maintenance','clients','stockMovements','invoices','attendance','activityLog'].forEach(k=>{
      state[k]=JSON.parse(JSON.stringify(SEED[k]));
    });
    saveState();
    toast('📥 Demo data loaded!');
    state.section = 'Dashboard';
    render();
  }
}

function renderContent(){
  if(!state.authenticated){loginView();return;}
  $('#login').classList.add('hidden');
  $('#app').classList.remove('hidden');
  navView();topView();

  const views={
    Dashboard:dashboardView,Shipments:shipmentsView,Invoices:invoicesView,
    Clients:clientsView,Staff:staffView,Salaries:salariesView,Attendance:attendanceView,
    Vehicles:vehiclesView,['Fuel Logs']:fuelLogsView,Maintenance:maintenanceView,
    Stock:stockView,Receiving:receivingView,Payments:paymentsView,
    Reports:reportsView,['Activity Log']:activityLogView,Settings:settingsView,Guide:guideView
  };
  $('#content').innerHTML=(views[state.section]||dashboardView)();
  $('#modals').innerHTML=buildModalHTML();
  wireModals();
  renderNotifications();
  animateKPIs();
}

function render(sv=true){
  if(sv)saveState();
  renderContent();
  setTimeout(renderCharts,80);
}

render();
