<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waybill</title>
  <style>
    :root{--bg:#07111f;--panel:rgba(13,21,38,.88);--panel2:rgba(17,27,47,.95);--line:rgba(142,160,201,.16);--text:#edf2ff;--muted:#97a3c4;--accent:#ff8a3d;--good:#3ddc97;--bad:#ff5c5c;--shadow:0 22px 70px rgba(0,0,0,.38)}
    *{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(255,138,61,.16),transparent 28%),radial-gradient(circle at top right,rgba(61,220,151,.12),transparent 24%),linear-gradient(180deg,#07111f 0%,#0b1324 46%,#070d17 100%)}
    button,input,select{font:inherit} button{cursor:pointer;border:0}
    .app{min-height:100%;display:grid;grid-template-columns:280px 1fr}.sidebar{padding:28px 22px;border-right:1px solid var(--line);background:linear-gradient(180deg,rgba(9,14,26,.98),rgba(5,9,16,.98));backdrop-filter:blur(14px);display:flex;flex-direction:column;justify-content:space-between}
    .brand{display:flex;gap:12px;align-items:center}.logo{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;color:#ffcfaa;background:linear-gradient(135deg,rgba(255,138,61,.24),rgba(255,138,61,.08));border:1px solid rgba(255,138,61,.18);font-weight:800}.brand h1{margin:0;font-size:1.1rem}.muted{color:var(--muted)}
    .nav{display:grid;gap:8px;margin-top:24px}.nav button,.role-switch button,.btn,.pill-btn,.signout,.status-btn{border:0;border-radius:14px;padding:.85rem 1rem;color:var(--text);background:rgba(255,255,255,.03)}.nav button.active,.role-switch button.active{background:linear-gradient(135deg,#ffcfaa,#ff8a3d);color:#07111f;font-weight:700}.nav button{display:flex;align-items:center;gap:10px;text-align:left}.sidebar .card{border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow);border-radius:20px;padding:1rem}.role-switch{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.signout{display:flex;align-items:center;gap:8px;justify-content:center}.main{padding:28px;min-width:0}.topbar{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;flex-wrap:wrap}.search{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow);border-radius:16px;padding:0 .9rem;min-width:min(420px,100%)}.search input{border:0;background:transparent;color:var(--text);outline:none;padding:.9rem 0;width:100%}.user{border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:16px;padding:.85rem 1rem;min-width:220px;text-align:right}.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin:16px 0}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin:16px 0}.card,.panel,.modal{border:1px solid var(--line);background:var(--panel2);box-shadow:var(--shadow);border-radius:24px}.card{padding:1rem;display:flex;gap:14px;align-items:center;min-height:104px}.icon{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;background:rgba(255,255,255,.04);font-weight:800}.value{font-size:1.8rem;font-weight:800;line-height:1}.label,.section,.field label,.sub{color:var(--muted)} .section{text-transform:uppercase;letter-spacing:.12em;font-size:.82rem;margin:0 0 14px}.two{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.panel{padding:1.1rem}.row{display:flex;justify-content:space-between;gap:14px;align-items:center;padding:.9rem 0;border-bottom:1px solid rgba(255,255,255,.05)}.row:last-child{border-bottom:0}.title{font-weight:700}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.badge,.status-btn{display:inline-flex;align-items:center;justify-content:center;padding:.35rem .72rem;border-radius:999px;font-size:.78rem;font-weight:700}.table{width:100%;border-collapse:collapse}.table th{text-align:left;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:.8rem .6rem;border-bottom:1px solid rgba(255,255,255,.06)}.table td{padding:.92rem .6rem;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}.table tr:hover{background:rgba(255,255,255,.02)}
    .ship-layout{display:grid;grid-template-columns:340px 1fr;gap:14px}.ship-card{width:100%;text-align:left;padding:1rem;border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow);border-radius:24px;color:var(--text);margin-bottom:12px}.ship-card.active{border-color:rgba(255,138,61,.32);background:linear-gradient(180deg,rgba(255,138,61,.11),rgba(17,27,47,.92))}.ship-top,.head,.modal-head,.modal-foot,.field-row,.grn-head,.staff-head{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.route{height:10px;border-radius:999px;background:rgba(255,255,255,.08);margin:24px 0 14px;position:relative;overflow:hidden}.fill{position:absolute;inset:0 auto 0 0;border-radius:inherit}.truck{position:absolute;top:50%;transform:translateY(-50%)}
    .modal-backdrop{position:fixed;inset:0;background:rgba(4,7,15,.72);display:none;align-items:center;justify-content:center;padding:22px;z-index:50}.modal{width:min(560px,100%);padding:1.1rem}.modal-backdrop.show{display:flex}.modal-body{padding:.7rem 0;display:grid;gap:12px}.field{display:grid;gap:8px}.field input,.field select{width:100%;border:1px solid var(--line);background:rgba(6,10,20,.78);color:var(--text);padding:.95rem 1rem;border-radius:14px;outline:none}.toast{position:fixed;right:20px;bottom:20px;display:none;align-items:center;gap:8px;padding:.85rem 1rem;border-radius:999px;background:rgba(61,220,151,.16);border:1px solid rgba(61,220,151,.28);color:#dff8ed;z-index:60}.toast.show{display:flex}
    .login{min-height:100%;display:grid;place-items:center;padding:24px}.login-card{width:min(1080px,100%);display:grid;grid-template-columns:1.1fr .9fr;border:1px solid var(--line);background:rgba(8,13,24,.88);border-radius:30px;overflow:hidden}.login-copy,.login-form{padding:2rem}.login-form{background:rgba(14,22,41,.96)}.kicker{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(255,138,61,.18);background:rgba(255,138,61,.08);padding:.5rem .8rem;border-radius:999px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#ffcfaa;font-weight:700}.hero{font-size:clamp(2.2rem,4vw,4rem);line-height:.97;margin:1rem 0 .35rem}.preview-row{display:flex;justify-content:space-between;gap:1rem;padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.06)}.preview-row:last-child{border-bottom:0}
    .auth-fields{display:grid;gap:14px;margin-top:16px}.auth-fields input,.auth-fields select{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);padding:.95rem 1rem;border-radius:14px;outline:none}.content{min-width:0}.hidden{display:none}.mobile-only{display:none}
    @media (max-width:1100px){.app{grid-template-columns:1fr}.sidebar{border-right:0;border-bottom:1px solid var(--line)}.grid4,.grid3,.two,.ship-layout,.login-card{grid-template-columns:1fr}.topbar{align-items:flex-start}.search{min-width:100%}.user{text-align:left}.mobile-only{display:block}}
  </style>
</head>
<body>
  <div id="login" class="login"></div>
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div>
        <div class="brand"><div class="logo">WB</div><div><h1>Waybill</h1><div class="muted">Industrial logistics control</div></div></div>
        <div class="nav" id="nav"></div>
      </div>
      <div style="display:grid;gap:14px">
        <div class="card"><div style="width:100%"><div class="label">Session role</div><div class="role-switch"><button id="roleAdmin">Admin</button><button id="roleStaff">Staff</button></div></div></div>
        <div class="card" style="display:flex;align-items:center;gap:8px"><span>🛡️</span><span id="roleNote">Full operations access</span></div>
        <button class="signout" id="signOut">Sign out</button>
      </div>
    </aside>
    <main class="main content">
      <div class="topbar">
        <div><div class="label" style="text-transform:uppercase;letter-spacing:.16em;font-size:.8rem">Operations overview</div><h1 id="pageTitle" style="margin:.4rem 0 0;font-size:clamp(2rem,3vw,3rem)">Dashboard</h1></div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end">
          <div class="user"><div id="displayName" style="font-weight:700"></div><div id="emailText" class="sub mono"></div></div>
          <div class="search"><span>🔎</span><input id="search" placeholder="Search shipments, clients, or hubs" /></div>
          <div class="card" style="padding:.8rem 1rem;min-height:auto">📍 Live network</div>
        </div>
      </div>
      <div id="toast" class="toast">Saved</div>
      <section id="content"></section>
    </main>
  </div>
  <div id="modals"></div>
  <script>
    const state = {
      authenticated:false, role:'Admin', email:'', displayName:'', section:'Dashboard', search:'', toast:'', selectedShipment:'WB-48213',
      selectedReceiving:'GRN-3081',
      stock:[
        {sku:'PLT-1180',item:'Standard pallets (48x40)',warehouse:'Reno DC',qty:412,reorder:150,unit:'pcs'},
        {sku:'FUEL-DSL',item:'Diesel reserve',warehouse:'Detroit Yard 3',qty:88,reorder:200,unit:'gal'},
        {sku:'PKG-STR1',item:'Strapping rolls',warehouse:'Reno DC',qty:36,reorder:50,unit:'rolls'},
        {sku:'TIRE-22R',item:'Tires 22.5R (drive axle)',warehouse:'Columbus Hub',qty:14,reorder:12,unit:'pcs'},
        {sku:'COLD-GEL',item:'Cold-chain gel packs',warehouse:'Atlanta Hub',qty:540,reorder:300,unit:'pcs'},
        {sku:'PPE-GLV',item:'Loading gloves (L)',warehouse:'Reno DC',qty:22,reorder:40,unit:'pairs'}
      ],
      receiving:[
        {id:'GRN-3081',supplier:'Premier Pallet Supply',date:'Jun 28',status:'received',approval:'approved',bill:'premier-3081.pdf',items:3,value:4120},
        {id:'GRN-3082',supplier:'Continental Tire Distributors',date:'Jun 29',status:'partial',approval:'pending',bill:'continential-3082.pdf',items:5,value:9860},
        {id:'GRN-3083',supplier:'ColdPack Industries',date:'Jun 30',status:'pending',approval:'pending',bill:'',items:2,value:2310},
        {id:'GRN-3079',supplier:'FuelCo Bulk Services',date:'Jun 26',status:'received',approval:'approved',bill:'fuelco-3079.pdf',items:1,value:18450}
      ],
      receivingLines:{
        'GRN-3081':[{name:'Standard pallets (48x40)',ordered:500,received:500},{name:'Strapping rolls',ordered:60,received:60},{name:'Corner protectors',ordered:1000,received:1000}],
        'GRN-3082':[{name:'Tires 22.5R (drive axle)',ordered:20,received:12},{name:'Wheel balancing weights',ordered:200,received:200}],
        'GRN-3083':[{name:'Cold-chain gel packs',ordered:800,received:0},{name:'Insulated liners',ordered:150,received:0}],
        'GRN-3079':[{name:'Diesel reserve',ordered:2000,received:2000}]
      },
      transactions:[
        {id:'TXN-9001',type:'income',desc:'Freight payment - Northbridge Foods',date:'Jun 30',amount:6200,category:'Client payment',owner:'finance@waybill.local'},
        {id:'TXN-9002',type:'expense',desc:'Diesel refuel - TRK-0731',date:'Jun 30',amount:410,category:'Fuel',owner:'maria@waybill.local'},
        {id:'TXN-9003',type:'expense',desc:'Toll - I-80 corridor',date:'Jun 30',amount:38,category:'Toll',owner:'maria@waybill.local'},
        {id:'TXN-9004',type:'expense',desc:'Driver payout - M. Okafor',date:'Jun 29',amount:980,category:'Payroll',owner:'finance@waybill.local'},
        {id:'TXN-9005',type:'income',desc:'Freight payment - Verde Pharma',date:'Jun 29',amount:4750,category:'Client payment',owner:'finance@waybill.local'},
        {id:'TXN-9006',type:'expense',desc:'Tire replacement - Columbus Hub',date:'Jun 28',amount:1240,category:'Maintenance',owner:'ricardo@waybill.local'},
        {id:'TXN-9007',type:'expense',desc:'Warehouse lease - Reno DC',date:'Jun 27',amount:5200,category:'Facilities',owner:'finance@waybill.local'}
      ],
      staff:[
        {name:'Maria Okafor',email:'maria@waybill.local',role:'Driver',access:'Staff',status:'active',initials:'MO'},
        {name:'Ricardo Vasquez',email:'ricardo@waybill.local',role:'Driver',access:'Staff',status:'active',initials:'RV'},
        {name:'Sungmin Park',email:'sungmin@waybill.local',role:'Driver',access:'Staff',status:'active',initials:'SP'},
        {name:'Jamal Bell',email:'jamal@waybill.local',role:'Dispatcher',access:'Staff',status:'active',initials:'JB'},
        {name:'Elena Cho',email:'elena@waybill.local',role:'Warehouse Lead',access:'Staff',status:'suspended',initials:'EC'},
        {name:'David Reyes',email:'david@waybill.local',role:'Operations Manager',access:'Admin',status:'active',initials:'DR'}
      ],
      stockMovements:[
        {id:'SM-1001',sku:'PLT-1180',type:'in',qty:500,source:'Premier Pallet Supply',date:'Jun 28',status:'approved',bill:'premier-3081.pdf'},
        {id:'SM-1002',sku:'FUEL-DSL',type:'out',qty:120,source:'TRK-0731 dispatch',date:'Jun 30',status:'pending',bill:'fuel-slip-1002.pdf'},
        {id:'SM-1003',sku:'PKG-STR1',type:'in',qty:60,source:'Continental Tire Distributors',date:'Jun 29',status:'approved',bill:'cont-3082.pdf'},
        {id:'SM-1004',sku:'PPE-GLV',type:'out',qty:12,source:'Outbound loading',date:'Jun 30',status:'approved',bill:'issue-1004.pdf'}
      ],
      modals:{stock:false,receiving:false,payment:false,staff:false},
      forms:{},
    };
    const SHIPMENTS=[
      {id:'WB-48213',client:'Northbridge Foods',origin:'Long Beach, CA',dest:'Reno, NV',status:'in_transit',eta:'2:40 PM',progress:.62,driver:'Maria Okafor',vehicle:'TRK-0731'},
      {id:'WB-48190',client:'Calder Steel Co.',origin:'Gary, IN',dest:'Detroit, MI',status:'delayed',eta:'11:15 AM',progress:.41,driver:'Ricardo Vasquez',vehicle:'TRK-0559'},
      {id:'WB-48177',client:'Verde Pharma',origin:'Memphis, TN',dest:'Atlanta, GA',status:'delivered',eta:'Delivered 8:52 AM',progress:1,driver:'Sungmin Park',vehicle:'TRK-0416'},
      {id:'WB-48241',client:'Hallstrom Furniture',origin:'High Point, NC',dest:'Columbus, OH',status:'scheduled',eta:'6:05 PM',progress:0,driver:'Jamal Bell',vehicle:'TRK-0820'}
    ];
    const sectionsAdmin=['Dashboard','Shipments','Stock','Receiving slips','Payments & expenses','Staff management'];
    const sectionsStaff=['Dashboard','Shipments','Stock','Receiving slips','Payments & expenses'];
    const statusMeta={ in_transit:['In transit','#FF8A3D','rgba(255,138,61,.12)'], delayed:['Delayed','#FF5C5C','rgba(255,92,92,.12)'], delivered:['Delivered','#3DDC97','rgba(61,220,151,.12)'], scheduled:['Scheduled','#8B93A7','rgba(139,147,167,.12)'], received:['Received','#3DDC97','rgba(61,220,151,.12)'], partial:['Partial','#FF8A3D','rgba(255,138,61,.12)'], pending:['Pending','#8B93A7','rgba(139,147,167,.12)'], active:['Active','#3DDC97','rgba(61,220,151,.12)'], suspended:['Suspended','#FF5C5C','rgba(255,92,92,.12)'] };
    const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
    const money=n=>`$${Number(n).toLocaleString()}`;
    const badge=s=>{const [label,color,bg]=statusMeta[s]||statusMeta.pending; return `<span class="badge" style="color:${color};background:${bg}">${label}</span>`};
    const toast=(msg)=>{state.toast=msg; render(); clearTimeout(window.toastTimer); window.toastTimer=setTimeout(()=>{state.toast=''; render()},1800)};
    function loginView(){
      $('#login').innerHTML=`<div class="login-card"><div class="login-copy"><div class="kicker">WAYBILL // prototype auth</div><div class="hero">Logistics control for freight ops</div><div class="muted">Sign in with any email and password. Toggle Admin or Staff to change what you can see. Everything stays in local browser state.</div><div class="panel" style="margin-top:18px"><div class="section">Included modules</div><div class="preview-row"><span>Dashboard</span><span class="mono">KPI cards</span></div><div class="preview-row"><span>Shipments</span><span class="mono">Route detail</span></div><div class="preview-row"><span>Receiving</span><span class="mono">Expandable GRNs</span></div></div></div><div class="login-form"><div class="section" style="margin-top:0">Sign in</div><h2 style="margin:.2rem 0 1rem;font-size:1.7rem">Access Waybill</h2><form id="loginForm" class="auth-fields"><input id="loginEmail" placeholder="name@company.com"><input id="loginPassword" type="password" placeholder="Anything signs you in"><div class="role-switch"><button type="button" id="loginAdmin" class="active">Admin</button><button type="button" id="loginStaff">Staff</button></div><button class="btn" style="background:linear-gradient(135deg,#ffcfaa,#ff8a3d);color:#07111f;font-weight:800">Enter Waybill</button></form></div></div>`;
      $('#app').classList.add('hidden'); $('#login').classList.remove('hidden');
      let loginRole='Admin'; $('#loginAdmin').onclick=()=>{loginRole='Admin'; $('#loginAdmin').classList.add('active'); $('#loginStaff').classList.remove('active')}; $('#loginStaff').onclick=()=>{loginRole='Staff'; $('#loginStaff').classList.add('active'); $('#loginAdmin').classList.remove('active')};
      $('#loginForm').onsubmit=e=>{e.preventDefault(); state.authenticated=true; state.role=loginRole; state.email=$('#loginEmail').value.trim()||`${loginRole.toLowerCase()}@waybill.local`; state.displayName=state.email.split('@')[0].replace(/[._-]/g,' ').replace(/\b\w/g,m=>m.toUpperCase()); state.section='Dashboard'; toast(`Signed in as ${loginRole}`)}
    }
    function navItems(){ return state.role==='Admin'?sectionsAdmin:sectionsStaff }
    function navView(){
      $('#nav').innerHTML=navItems().map(s=>`<button class="${state.section===s?'active':''}" data-section="${s}">${s}</button>`).join('');
      $$('#nav button').forEach(b=>b.onclick=()=>{state.section=b.dataset.section; render()});
      $('#roleAdmin').className=state.role==='Admin'?'active':''; $('#roleStaff').className=state.role==='Staff'?'active':'';
      $('#roleAdmin').onclick=()=>{state.role='Admin'; if(!navItems().includes(state.section)) state.section='Dashboard'; render()};
      $('#roleStaff').onclick=()=>{state.role='Staff'; if(!navItems().includes(state.section)) state.section='Dashboard'; render()};
      $('#roleNote').textContent=state.role==='Admin'?'Full operations access':'Limited self-service access';
      $('#signOut').onclick=()=>{state.authenticated=false; state.email=''; state.displayName=''; render()};
    }
    function topView(){ $('#pageTitle').textContent=state.section; $('#displayName').textContent=state.displayName; $('#emailText').textContent=state.email; $('#search').value=state.search; $('#search').oninput=e=>{state.search=e.target.value; render(false)}; }
    function kpi(value,label,color){return `<div class="card"><div class="icon" style="color:${color};background:${color}1F">•</div><div><div class="value">${value}</div><div class="label">${label}</div></div></div>`}
    function dashboard(){ const income=state.transactions.filter(t=>t.type==='income').reduce((a,b)=>a+b.amount,0); const expense=state.transactions.filter(t=>t.type==='expense').reduce((a,b)=>a+b.amount,0); const lowStock=state.stock.filter(s=>s.qty<s.reorder).length; const pending=state.receiving.filter(r=>r.approval!=='approved').length; const staffOnShift=state.staff.filter(s=>s.status==='active').length; const active=SHIPMENTS.filter(s=>s.status==='in_transit').length;
      return `<div class="grid4">${kpi(active,'Active shipments','#ff8a3d')}${kpi(lowStock,'Low stock alerts','#ff5c5c')}${kpi(pending,'Pending approvals','#8b93a7')}${kpi(state.role==='Admin'?money(income-expense):staffOnShift,state.role==='Admin'?'Net this week':'Staff on shift','#3ddc97')}</div><div class="two"><div class="panel"><div class="section">Shipments in motion</div>${SHIPMENTS.filter(s=>s.status!=='delivered').map(s=>`<div class="row"><div><div class="title">${s.client}</div><div class="sub">${s.origin} - ${s.dest}</div></div>${badge(s.status)}</div>`).join('')}</div><div class="panel"><div class="section">Stock needing attention</div>${state.stock.filter(s=>s.qty<s.reorder).map(s=>`<div class="row"><div><div class="title">${s.item}</div><div class="sub">${s.warehouse} - ${s.qty} ${s.unit} on hand</div></div>${badge('pending')}</div>`).join('')}</div></div>` }
    function shipmentView(){ const q=state.search.trim().toLowerCase(); const filtered=SHIPMENTS.filter(s=>!q||[s.id,s.client,s.origin,s.dest].some(v=>v.toLowerCase().includes(q))); const selected=SHIPMENTS.find(s=>s.id===state.selectedShipment)||SHIPMENTS[0]; return `<div class="ship-layout"><div>${filtered.map(s=>`<button class="ship-card ${s.id===selected.id?'active':''}" data-ship="${s.id}"><div class="ship-top"><span class="mono badge" style="background:rgba(255,255,255,.03);color:#dce5ff">${s.id}</span>${badge(s.status)}</div><div class="title" style="margin-top:.8rem">${s.client}</div><div class="sub">${s.origin} - ${s.dest}</div><div class="row" style="padding:.75rem 0 0;border:0"><span class="sub">Approval</span><span class="status-btn">${s.status==='delivered'?'approved':'pending'}</span></div></button>`).join('')}</div><div class="panel"><div class="head"><div><div class="mono badge" style="background:rgba(255,255,255,.03);color:#dce5ff">${selected.id}</div><div class="title" style="font-size:2rem;margin-top:.55rem">${selected.client}</div></div>${badge(selected.status)}</div><div class="route"><div class="fill" style="width:${selected.progress*100}%;background:${statusMeta[selected.status][1]}"></div><div class="truck" style="left:calc(${selected.progress*100}% - 9px);color:${statusMeta[selected.status][1]}">🚚</div></div><div class="row"><span class="sub">${selected.origin}</span><span class="sub">${selected.dest}</span></div><div class="row"><span class="sub">ETA</span><strong>${selected.eta}</strong></div><div class="row"><span class="sub">Driver</span><strong>${selected.driver}</strong></div><div class="row"><span class="sub">Vehicle</span><strong>${selected.vehicle}</strong></div><div class="row"><span class="sub">Approve shipment</span><button class="btn" data-approve-ship="${selected.id}">Approve</button></div></div></div>` }
    function stockView(){ const totalIn=state.stockMovements.filter(m=>m.type==='in' && m.status==='approved').reduce((a,b)=>a+b.qty,0); const totalOut=state.stockMovements.filter(m=>m.type==='out' && m.status==='approved').reduce((a,b)=>a+b.qty,0); const pending=state.stockMovements.filter(m=>m.status!=='approved').length; return `<div class="grid3">${kpi(totalIn,'Items coming in','#3ddc97')}${kpi(totalOut,'Items going out','#ff8a3d')}${kpi(pending,'Pending approvals','#8b93a7')}</div><div class="panel"><div class="head"><div class="section" style="margin:0">Inventory - ${state.stock.length} SKUs</div><button class="btn" data-open="stock">+ New item</button></div><table class="table"><thead><tr><th>SKU</th><th>Item</th><th>Warehouse</th><th>On hand</th><th>Reorder at</th><th>Status</th></tr></thead><tbody>${state.stock.map(s=>`<tr><td class="mono">${s.sku}</td><td>${s.item}</td><td>${s.warehouse}</td><td>${s.qty} ${s.unit}</td><td>${s.reorder} ${s.unit}</td><td>${badge(s.qty<s.reorder?'pending':'active')}</td></tr>`).join('')}</tbody></table></div><div class="panel" style="margin-top:14px"><div class="head"><div class="section" style="margin:0">Stock movements</div><button class="btn" data-open="movement">+ Bill upload / movement</button></div><table class="table"><thead><tr><th>ID</th><th>SKU</th><th>Type</th><th>Qty</th><th>Bill</th><th>Status</th><th>Action</th></tr></thead><tbody>${state.stockMovements.map(m=>`<tr><td class="mono">${m.id}</td><td>${m.sku}</td><td>${m.type==='in'?'Coming in':'Going out'}</td><td>${m.qty}</td><td>${m.bill||'No bill'}</td><td>${badge(m.status)}</td><td>${m.status==='approved'?'<span class="badge" style="color:#3ddc97;background:rgba(61,220,151,.12)">Approved</span>':`<button class="btn" data-approve-movement="${m.id}">Approve</button>`}</td></tr>`).join('')}</tbody></table></div>` }
    function receivingView(){ const selected=state.receiving.find(r=>r.id===state.selectedReceiving)||state.receiving[0]; return `<div class="panel"><div class="head"><div class="section" style="margin:0">Receiving slips - ${state.receiving.length} total</div><button class="btn" data-open="receiving">+ New slip</button></div>${state.receiving.map(r=>`<details open="${r.id===selected.id?'open':''}" style="margin-top:14px"><summary style="list-style:none;cursor:pointer"><div class="grn-head"><div><div class="title">${r.id} - ${r.supplier}</div><div class="sub">${r.date} - ${r.items} line items - ${money(r.value)}</div></div><div style="display:flex;align-items:center;gap:10px">${badge(r.status)}<span class="badge" style="color:${r.approval==='approved'?'#3ddc97':'#ff8a3d'};background:${r.approval==='approved'?'rgba(61,220,151,.12)':'rgba(255,138,61,.12)'}">${r.approval==='approved'?'Approved':'Needs approval'}</span></div></div></summary><table class="table" style="margin-top:10px"><thead><tr><th>Item</th><th>Ordered</th><th>Received</th><th>Status</th></tr></thead><tbody>${(state.receivingLines[r.id]||[]).map(l=>{const full=l.received>=l.ordered&&l.ordered>0; const none=l.received===0; const status=full?'received':none?'pending':'partial'; return `<tr><td>${l.name}</td><td>${l.ordered}</td><td>${l.received}</td><td>${badge(status)}</td></tr>`}).join('')}</tbody></table><div class="row"><span class="sub">Bill</span><span class="mono">${r.bill||'No bill uploaded'}</span></div><div class="row"><span class="sub">Approval</span><button class="btn" data-approve-receiving="${r.id}">${r.approval==='approved'?'Approved':'Approve receiving'}</button></div></details>`).join('')}</div>` }
    function paymentsView(){ const income=state.transactions.filter(t=>t.type==='income').reduce((a,b)=>a+b.amount,0); const expense=state.transactions.filter(t=>t.type==='expense').reduce((a,b)=>a+b.amount,0); const visible=state.role==='Admin'?state.transactions:state.transactions.filter(t=>t.type==='expense'&&t.owner===state.email); return `<div>${state.role==='Admin'?`<div class="grid3">${kpi(money(income),'Income (7d)','#3ddc97')}${kpi(money(expense),'Expenses (7d)','#ff5c5c')}${kpi(money(income-expense),'Net cashflow','#ff8a3d')}</div>`:''}<div class="panel"><div class="head"><div class="section" style="margin:0">Transactions - ${visible.length} entries</div><button class="btn" data-open="payment">+ New entry</button></div><table class="table"><thead><tr><th>ID</th><th>Description</th><th>Category</th><th>Date</th><th>Amount</th><th>Type</th></tr></thead><tbody>${visible.map(t=>`<tr><td class="mono">${t.id}</td><td>${t.desc}</td><td>${t.category}</td><td>${t.date}</td><td style="color:${t.type==='income'?'var(--good)':'#ffb1b1'}">${t.type==='income'?'+':'-'}${money(t.amount)}</td><td>${badge(t.type==='income'?'active':'suspended')}</td></tr>`).join('')}</tbody></table></div></div>` }
    function staffView(){ if(state.role!=='Admin') return `<div class="panel">Staff management is hidden from Staff role.</div>`; return `<div class="panel"><div class="head"><div class="section" style="margin:0">Team directory - ${state.staff.length} people</div><button class="btn" data-open="staff">+ Invite staff</button></div><table class="table"><thead><tr><th>Name</th><th>Role</th><th>Access</th><th>Status</th><th>Email</th></tr></thead><tbody>${state.staff.map((p,i)=>`<tr><td><div style="display:flex;align-items:center;gap:12px"><div class="icon" style="width:40px;height:40px;border-radius:14px;color:#ffcfaa;background:linear-gradient(135deg,rgba(255,138,61,.18),rgba(61,220,151,.12))">${p.initials}</div><div><div class="title">${p.name}</div><div class="sub mono">${p.email}</div></div></div></td><td>${p.role}</td><td>${p.access}</td><td><button class="status-btn" data-status="${i}">${p.status}</button></td><td>${p.email}</td></tr>`).join('')}</tbody></table></div>` }
    function renderModals(){ const m=state.modals; $('#modals').innerHTML=`<div class="modal-backdrop ${m.stock?'show':''}" id="modalStock"><div class="modal"><div class="head"><strong>New inventory item</strong><button data-close="stock">✕</button></div><div class="modal-body"><label class="field"><span class="sub">SKU</span><input id="stockSku"></label><label class="field"><span class="sub">Item name</span><input id="stockItem"></label><label class="field"><span class="sub">Warehouse</span><input id="stockWarehouse"></label><div class="field-row"><label class="field"><span class="sub">Quantity on hand</span><input id="stockQty" type="number"></label><label class="field"><span class="sub">Reorder threshold</span><input id="stockReorder" type="number"></label></div><label class="field"><span class="sub">Unit</span><select id="stockUnit"><option>pcs</option><option>gal</option><option>rolls</option><option>pairs</option></select></label></div><div class="modal-foot"><button class="btn" data-close="stock">Cancel</button><button class="btn" id="saveStock" style="background:linear-gradient(135deg,#ffcfaa,#ff8a3d);color:#07111f;font-weight:800">Add item</button></div></div></div>
      <div class="modal-backdrop ${m.movement?'show':''}" id="modalMovement"><div class="modal"><div class="head"><strong>Stock movement + bill upload</strong><button data-close="movement">✕</button></div><div class="modal-body"><label class="field"><span class="sub">SKU</span><select id="moveSku">${state.stock.map(s=>`<option value="${s.sku}">${s.sku} - ${s.item}</option>`).join('')}</select></label><div class="field-row"><label class="field"><span class="sub">Type</span><select id="moveType"><option value="in">Coming in</option><option value="out">Going out</option></select></label><label class="field"><span class="sub">Qty</span><input id="moveQty" type="number" value="1"></label></div><label class="field"><span class="sub">Source / destination</span><input id="moveSource" placeholder="Supplier, warehouse, or truck"></label><label class="field"><span class="sub">Bill upload</span><input id="moveBill" type="file" accept="image/*,.pdf"></label></div><div class="modal-foot"><button class="btn" data-close="movement">Cancel</button><button class="btn" id="saveMovement" style="background:linear-gradient(135deg,#ffcfaa,#ff8a3d);color:#07111f;font-weight:800">Save movement</button></div></div></div>
      <div class="modal-backdrop ${m.receiving?'show':''}" id="modalReceiving"><div class="modal"><div class="head"><strong>New receiving slip</strong><button data-close="receiving">✕</button></div><div class="modal-body"><label class="field"><span class="sub">Supplier</span><input id="recvSupplier"></label><div class="field-row"><label class="field"><span class="sub">Line items</span><input id="recvItems" type="number" value="1"></label><label class="field"><span class="sub">Estimated value ($)</span><input id="recvValue" type="number" value="0"></label></div></div><div class="modal-foot"><button class="btn" data-close="receiving">Cancel</button><button class="btn" id="saveReceiving" style="background:linear-gradient(135deg,#ffcfaa,#ff8a3d);color:#07111f;font-weight:800">Create slip</button></div></div></div>
      <div class="modal-backdrop ${m.payment?'show':''}" id="modalPayment"><div class="modal"><div class="head"><strong>${state.role==='Admin'?'New transaction':'Submit expense'}</strong><button data-close="payment">✕</button></div><div class="modal-body"><label class="field"><span class="sub">Description</span><input id="payDesc"></label><label class="field"><span class="sub">Category</span><input id="payCat"></label><div class="field-row"><label class="field"><span class="sub">Amount ($)</span><input id="payAmt" type="number" value="0"></label>${state.role==='Admin'?`<label class="field"><span class="sub">Type</span><select id="payType"><option>expense</option><option>income</option></select></label>`:''}</div></div><div class="modal-foot"><button class="btn" data-close="payment">Cancel</button><button class="btn" id="savePayment" style="background:linear-gradient(135deg,#ffcfaa,#ff8a3d);color:#07111f;font-weight:800">Save</button></div></div></div>
      <div class="modal-backdrop ${m.staff?'show':''}" id="modalStaff"><div class="modal"><div class="head"><strong>Invite staff</strong><button data-close="staff">✕</button></div><div class="modal-body"><label class="field"><span class="sub">Full name</span><input id="staffName"></label><label class="field"><span class="sub">Email</span><input id="staffEmail"></label><div class="field-row"><label class="field"><span class="sub">Role</span><input id="staffRole" value="Driver"></label><label class="field"><span class="sub">Access</span><select id="staffAccess"><option>Staff</option><option>Admin</option></select></label></div></div><div class="modal-foot"><button class="btn" data-close="staff">Cancel</button><button class="btn" id="saveStaff" style="background:linear-gradient(135deg,#ffcfaa,#ff8a3d);color:#07111f;font-weight:800">Invite</button></div></div></div>`;
      $$('[data-close]').forEach(b=>b.onclick=()=>{state.modals[b.dataset.close]=false; render()});
      if(m.stock) $('#saveStock').onclick=()=>{const sku=$('#stockSku').value.trim(); const item=$('#stockItem').value.trim(); if(!sku||!item) return; state.stock.unshift({sku,item,warehouse:$('#stockWarehouse').value.trim(),qty:+$('#stockQty').value||0,reorder:+$('#stockReorder').value||0,unit:$('#stockUnit').value}); state.modals.stock=false; toast(`${sku} added to inventory`)};
      if(m.movement) $('#saveMovement').onclick=()=>{const sku=$('#moveSku').value; const type=$('#moveType').value; const qty=+$('#moveQty').value||0; const source=$('#moveSource').value.trim(); const file=$('#moveBill').files[0]; const bill=file?file.name:''; if(!sku||!qty) return; state.stockMovements.unshift({id:`SM-${1005+state.stockMovements.length}`,sku,type,qty,source,bill,date:new Date().toLocaleString('en-US',{month:'short',day:'2-digit'}),status:'pending'}); state.modals.movement=false; toast(`Movement for ${sku} saved`)};
      if(m.receiving) $('#saveReceiving').onclick=()=>{const supplier=$('#recvSupplier').value.trim(); if(!supplier) return; const id=`GRN-${3084+state.receiving.length}`; state.receiving.unshift({id,supplier,date:new Date().toLocaleString('en-US',{month:'short',day:'2-digit'}),status:'pending',items:+$('#recvItems').value||1,value:+$('#recvValue').value||0}); state.receivingLines[id]=[{name:'Pending line item entry',ordered:0,received:0}]; state.modals.receiving=false; toast(`${id} created`)};
      if(m.payment) $('#savePayment').onclick=()=>{const desc=$('#payDesc').value.trim(); if(!desc) return; const id=`TXN-${9008+state.transactions.length}`; state.transactions.unshift({id,type:state.role==='Admin'?$('#payType').value:'expense',desc,date:new Date().toLocaleString('en-US',{month:'short',day:'2-digit'}),amount:+$('#payAmt').value||0,category:$('#payCat').value.trim()||'General',owner:state.email}); state.modals.payment=false; toast(state.role==='Admin'?`${id} recorded`:'Expense submitted for approval')};
      if(m.staff) $('#saveStaff').onclick=()=>{const name=$('#staffName').value.trim(); if(!name) return; const email=$('#staffEmail').value.trim()||name.toLowerCase().replace(/\s+/g,'.')+'@waybill.local'; const initials=name.split(/\s+/).slice(0,2).map(p=>p[0].toUpperCase()).join(''); state.staff.unshift({name,email,role:$('#staffRole').value.trim()||'Driver',access:$('#staffAccess').value,status:'active',initials}); state.modals.staff=false; toast(`${name} invited`)};
      $$('#content [data-approve-ship]').forEach(b=>b.onclick=()=>{const shipment=SHIPMENTS.find(s=>s.id===b.dataset.approveShip); if(!shipment) return; shipment.status='delivered'; toast(`${shipment.id} approved`); render()});
      $$('#content [data-approve-receiving]').forEach(b=>b.onclick=()=>{const slip=state.receiving.find(r=>r.id===b.dataset.approveReceiving); if(!slip) return; // update inventory quantities from receiving lines
        const lines = state.receivingLines[slip.id] || [];
        lines.forEach(l=>{ const stockItem = state.stock.find(s=>s.item===l.name); if(stockItem){ stockItem.qty = (stockItem.qty||0) + (l.received||0); } });
        slip.approval='approved'; slip.status='received'; toast(`${slip.id} approved and inventory updated`); render()});
      $$('#content [data-approve-movement]').forEach(b=>b.onclick=()=>{const movement=state.stockMovements.find(m=>m.id===b.dataset.approveMovement); if(!movement) return; // apply movement to inventory
        const stockItem = state.stock.find(s=>s.sku===movement.sku);
        if(stockItem){ if(movement.type==='in'){ stockItem.qty = (stockItem.qty||0) + (movement.qty||0); } else { stockItem.qty = Math.max(0, (stockItem.qty||0) - (movement.qty||0)); } }
        movement.status='approved'; toast(`${movement.id} approved and inventory updated`); render()});
      $$('[data-status]').forEach(b=>b.onclick=()=>{const i=+b.dataset.status; state.staff[i].status=state.staff[i].status==='active'?'suspended':'active'; render()});
      ['modalStock','modalReceiving','modalPayment','modalStaff'].forEach(id=>{const el=document.getElementById(id); if(el) el.onclick=e=>{if(e.target===el){const key=id.replace('modal','').toLowerCase(); state.modals[key]=false; render()}}});
    }
    function renderContent(){
      if(!state.authenticated){ loginView(); return; }
      $('#login').classList.add('hidden'); $('#app').classList.remove('hidden'); navView(); topView();
      $('#content').innerHTML = state.section==='Dashboard' ? dashboard() : state.section==='Shipments' ? shipmentView() : state.section==='Stock' ? stockView() : state.section==='Receiving slips' ? receivingView() : state.section==='Payments & expenses' ? paymentsView() : staffView();
      if(state.search.trim() && state.section==='Shipments') $('#content').insertAdjacentHTML('afterbegin', `<div class="muted" style="margin-bottom:16px">${SHIPMENTS.filter(s=>[s.id,s.client,s.origin,s.dest].some(v=>v.toLowerCase().includes(state.search.trim().toLowerCase()))).length} shipment(s) matched your search.</div>`);
      renderModals();
      $$('#content [data-ship]').forEach(b=>b.onclick=()=>{state.selectedShipment=b.dataset.ship; render()});
      $$('#content [data-open]').forEach(b=>b.onclick=()=>{state.modals[b.dataset.open]=true; render()});
    }
    function render(showToast=true){ renderContent(); $('#toast').className='toast'+(state.toast?' show':''); $('#toast').textContent=state.toast||''; }
    render();
  </script>
</body>
</html>
